<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>CineMatch — Resultado</title>
<link rel='preconnect' href='https://fonts.googleapis.com'>
<link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap' rel='stylesheet'>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
<link rel='stylesheet' href='result.css'>
</head>
<body>
<div class='glow glow-a'></div>
<div class='glow glow-b'></div>
<div class='hero'>
  <div class='hero-brand'><i class='ph ph-film-slate'></i> CineMatch</div>
  <div class='players-row'>
    <div class='p-pill pp1'><div class='p-av' id='av1'>A</div><span class='p-name' id='p1'>Pessoa 1</span></div>
    <span class='vs'>VS</span>
    <div class='p-pill pp2'><div class='p-av' id='av2'>B</div><span class='p-name' id='p2'>Pessoa 2</span></div>
  </div>
  <div class='ring-wrap'>
    <svg width='190' height='190' viewBox='0 0 190 190'>
      <circle class='r-bg' cx='95' cy='95' r='85'/>
      <circle class='r-fill' id='ring' cx='95' cy='95' r='85'/>
    </svg>
    <div class='ring-center'><div class='ring-pct' id='cpct'>0%</div><div class='ring-lbl'>compativeis</div></div>
  </div>
  <div class='compat-msg' id='cmsg'></div>
</div>
<div class='content'>
  <div class='sec'>
    <div class='sec-head'><i class='ph ph-chart-bar'></i><span>Comparativo de Generos</span></div>
    <div class='genres-grid'>
      <div class='g-panel gp1'><div class='g-panel-head'><div class='g-pav' id='gav1'>A</div><span class='g-pname' id='gp1'>Pessoa 1</span></div><div id='gt1'></div></div>
      <div class='g-panel gp2'><div class='g-panel-head'><div class='g-pav' id='gav2'>B</div><span class='g-pname' id='gp2'>Pessoa 2</span></div><div id='gt2'></div></div>
    </div>
  </div>
  <div class='sec'>
    <div class='sec-head'><i class='ph ph-popcorn'></i><span>Filmes Recomendados para Voces</span></div>
    <div id='movies'><div class='spinner'></div><div class='load-txt'>Buscando filmes...</div></div>
  </div>
</div>
<div class='center'><a href='index.html' class='btn-back'><i class='ph ph-arrow-left'></i> Novo quiz</a></div>
<script src='result.js'></script>
</body>
</html>
